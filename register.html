<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
<h3>User Registration</h3>

<input id="name" class="form-control mb-2" placeholder="Name">
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="pass" type="password" class="form-control mb-2" placeholder="Password">
<input id="cpass" type="password" class="form-control mb-2" placeholder="Confirm Password">

<button onclick="validate()" class="btn btn-warning">Register</button>

</div>

<script>
function validate() {
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;
let cpass = document.getElementById("cpass").value;

if(email=="" || pass=="" || cpass=="") {
alert("All fields are required");
}
else if(!email.includes("@")) {
alert("Invalid Email Format");
}
else if(pass.length < 6) {
alert("Password must be at least 6 characters");
}
else if(pass != cpass) {
alert("Passwords do not match");
}
else {
alert("Registration Successful");
}
}
</script>

</body>
</html>
