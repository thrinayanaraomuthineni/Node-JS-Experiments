<!DOCTYPE html>
<html>
<head>
<title>Catalog</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">MyShop</a>
  </div>
</nav>

<!-- Products -->
<div class="container mt-5">
<h2 class="text-center mb-4">Products</h2>

<div class="row">

<!-- Product 1 -->
<div class="col-md-4">
<div class="card shadow p-3">
<h5>Headphones</h5>
<p>₹1000</p>
<button class="btn btn-primary w-100" onclick="add('Headphones',1000)">Add to Cart</button>
</div>
</div>

<!-- Product 2 -->
<div class="col-md-4">
<div class="card shadow p-3">
<h5>Watch</h5>
<p>₹1500</p>
<button class="btn btn-primary w-100" onclick="add('Watch',1500)">Add to Cart</button>
</div>
</div>

</div>

<a href="cart.html" class="btn btn-success mt-4">Go to Cart</a>

</div>

<script>
function add(product, price){
  localStorage.setItem("product", product);
  localStorage.setItem("price", price);
}
</script>

</body>
</html>
