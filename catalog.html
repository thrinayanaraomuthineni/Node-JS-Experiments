<html>
<head>
<title>Catalog</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
<h2>Our Products</h2>

<div class="row">

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/200" class="card-img-top">
<div class="card-body">
<h5>Headphones</h5>
<button class="btn btn-primary"
        onclick="addToCart('Headphones',1000)">
  Add to Cart
</button>

</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/200" class="card-img-top">
<div class="card-body">
<h5>Watch</h5>
<button class="btn btn-primary"
        onclick="addToCart('Watch',1500)">
  Add to Cart
</button>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
<script>
function addToCart(product, price) {
  localStorage.setItem("product", product);
  localStorage.setItem("price", price);
  window.location.href = "cart.html";
}
</script>
